# Docker Compose configuration for Laravel + MySQL + Redis

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vegro-app
    ports:
      - "80:80"
    environment:
      - APP_NAME=VegroHR
      - APP_ENV=production
      - APP_DEBUG=false
      - APP_URL=http://localhost
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=${DB_DATABASE:-vegro_hr}
      - DB_USERNAME=${DB_USERNAME:-vegro}
      - DB_PASSWORD=${DB_PASSWORD:-vegro_password}
      - CACHE_DRIVER=redis
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - QUEUE_CONNECTION=redis
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - app-storage:/var/www/html/storage
      - app-cache:/var/www/html/bootstrap/cache
    networks:
      - app-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s

  mysql:
    image: mysql:8.0
    container_name: vegro-mysql
    environment:
      - MYSQL_DATABASE=${DB_DATABASE:-vegro_hr}
      - MYSQL_USER=${DB_USERNAME:-vegro}
      - MYSQL_PASSWORD=${DB_PASSWORD:-vegro_password}
      - MYSQL_ROOT_PASSWORD=${DB_ROOT_PASSWORD:-root_password}
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - app-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: vegro-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - app-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  mysql-data:
  redis-data:
  app-storage:
  app-cache:

networks:
  app-network:
    driver: bridge
